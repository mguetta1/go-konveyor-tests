name: Test TIER2 release braches

on:
  pull_request:
    branches: [ "release-0.5", "release-0.4", "release-0.3" ]
    paths-ignore:
      - '**.md'
  push:
    branches: [ "release-0.5", "release-0.4", "release-0.3" ]
    paths-ignore:
      - '**.md'

jobs:
  test-tier2:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: [ "release-0.5", "release-0.4", "release-0.3" ]
        include:
          - branch: "release-0.5"
            TAG: release-0.5
            OPERATOR_TAG: v0.5.1
          - branch: "release-0.4"
            TAG: release-0.4
            OPERATOR_TAG: v0.4.0
          - branch: "release-0.3"
            TAG: release-0.3
            OPERATOR_TAG: v0.3.2

    steps:
      - uses: actions/checkout@v3
      - name: start-minikube
        uses: konveyor/tackle2-operator/.github/actions/start-minikube@main
        with:
          memory: 6500M
      - name: install-tackle
        uses: konveyor/ci/.github/workflows/global-ci.yml@main
        with:
          tag: ${{ matrix.TAG }}
          operator_tag: ${{ matrix.OPERATOR_TAG }}
          # Not using global-ci.yml to run the tests
          run_api_tests: false
          run_ui_tests: false
      - uses: actions/setup-go@v3
        with:
          go-version: '1.19'
      - name: Install dependencies
        run: |
          go install github.com/onsi/ginkgo/v2/ginkgo
      - run: HUB_BASE_URL="http://$(minikube ip)/hub" DEBUG=1 make test-tier2
